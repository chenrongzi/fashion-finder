<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>找图助手 🌸</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- 顶部导航 -->
<header>
  <h1>🌸 找图助手</h1>
  <div class="stats" id="statsBar">加载中...</div>
</header>

<!-- Tab 导航 -->
<nav class="tabs">
  <button class="tab active" data-tab="upload">上传图片</button>
  <button class="tab" data-tab="extend">延展找图 ✨</button>
  <button class="tab" data-tab="gallery">图库</button>
</nav>

<!-- ── 上传页 ── -->
<section id="tab-upload" class="tab-content active">

  <!-- 上传区域 -->
  <div class="upload-card">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📷</div>
      <div class="upload-text">点击选择图片<br><small>支持从相册选择</small></div>
      <input type="file" id="fileInput" accept="image/*" multiple hidden>
    </div>

    <!-- URL 抓取 -->
    <div class="url-row">
      <input type="text" id="urlInput" placeholder="或者粘贴图片链接（小红书/淘宝）" />
      <button id="fetchBtn">抓取</button>
    </div>

    <!-- 来源平台 -->
    <div class="platform-row">
      <label>来源：</label>
      <select id="platformSelect">
        <option value="小红书">小红书</option>
        <option value="淘宝">淘宝</option>
        <option value="Instagram">Instagram</option>
        <option value="其他">其他</option>
      </select>
    </div>
  </div>

  <!-- 分析结果 -->
  <div id="analysisResult" class="analysis-card hidden"></div>

  <!-- 批量进度条 -->
  <div id="progressArea" class="progress-area hidden">
    <div class="progress-header">
      <span id="progressText">准备中...</span>
      <span id="progressEta"></span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- 上传进度列表 -->
  <div id="uploadQueue"></div>

</section>

<!-- ── 延展找图页 ── -->
<section id="tab-extend" class="tab-content">

  <!-- 第一步：选参考图 -->
  <div class="extend-step-card" id="extendStep1">
    <div class="step-label">第一步：选一张对味的参考图</div>
    <div class="seed-picker" id="seedPicker">
      <div class="seed-empty" id="seedEmpty">
        <div style="font-size:36px;margin-bottom:8px;">🖼️</div>
        <div>从图库里选一张"对味"的图</div>
        <div style="font-size:13px;color:#aaa;margin-top:4px;">点击下方图片选择</div>
      </div>
      <div id="seedSelected" class="seed-selected hidden"></div>
    </div>

    <!-- 缩略图库 -->
    <div id="seedGallery" class="seed-gallery"></div>
    <button id="seedLoadMore" class="seed-load-more hidden">加载更多</button>
  </div>

  <!-- 第二步：配置延展方向 -->
  <div class="extend-step-card" id="extendStep2">
    <div class="step-label">第二步：想找什么？</div>

    <div class="option-section">
      <div class="option-title">延展方向</div>
      <div class="option-pills" id="categoryPills">
        <button class="pill active" data-val="same">同风格相似款</button>
        <button class="pill" data-val="top">配上衣</button>
        <button class="pill" data-val="pants">配裤子</button>
        <button class="pill" data-val="skirt">配裙子</button>
        <button class="pill" data-val="dress">配连衣裙</button>
        <button class="pill" data-val="coat">配外套</button>
        <button class="pill" data-val="suit">找套装</button>
      </div>
    </div>

    <div class="option-section" id="elementSection">
      <div class="option-title">元素筛选 <span style="font-weight:400;color:#aaa">（可多选，融入搜索词）</span></div>
      <div class="option-pills" id="elementPills">
        <span class="element-hint">选好参考图后自动出现 👆</span>
      </div>
    </div>

    <div class="option-section">
      <div class="option-title">调整方向（可选）</div>
      <div class="option-pills" id="refinePills">
        <button class="pill" data-val="">不限</button>
        <button class="pill" data-val="premium">更高级</button>
        <button class="pill" data-val="new">更新更潮</button>
        <button class="pill" data-val="unique">不普通</button>
        <button class="pill" data-val="summer">夏款</button>
      </div>
    </div>

    <button class="extend-btn" id="extendSearchBtn">🔍 开始找图</button>
  </div>

  <!-- 搜索结果 -->
  <div id="extendResults" class="hidden">
    <div class="results-header">
      <div id="resultsTitle" class="results-title"></div>
      <div id="resultsKeywords" class="results-keywords"></div>
    </div>
    <div id="resultsLoading" class="results-loading hidden">
      <div class="loading-spinner"></div>
      <div>AI正在找图，稍等一下...</div>
    </div>
    <div id="resultsGrid" class="results-grid"></div>
    <div id="resultsEmpty" class="empty-tip hidden">没找到合适的，换个关键词试试？</div>
  </div>

</section>

<!-- ── 图库页 ── -->
<section id="tab-gallery" class="tab-content">

  <!-- 筛选栏 -->
  <div class="filter-bar">
    <button class="filter-btn active" data-status="">全部</button>
    <button class="filter-btn" data-status="pending">待审核</button>
    <button class="filter-btn" data-status="sent">已发老板娘</button>
    <button class="filter-btn" data-status="approved">通过 ✅</button>
    <button class="filter-btn" data-status="rejected">拒绝 ❌</button>
    <button class="filter-btn" data-status="favorite">收藏 ❤️</button>
    <button class="filter-btn select-toggle" id="selectModeBtn">多选</button>
  </div>

  <div id="gallery" class="gallery-grid"></div>
  <div id="galleryEmpty" class="empty-tip hidden">暂无图片</div>
  <button id="loadMoreBtn" class="load-more hidden">加载更多</button>

</section>

<!-- ── 批量操作底栏 ── -->
<div id="batchBar" class="batch-bar hidden">
  <span id="batchCount">已选 0 张</span>
  <div class="batch-actions">
    <button id="batchSelectAll">全选</button>
    <button id="batchDelete" class="danger">删除</button>
    <button id="batchCancel">取消</button>
  </div>
</div>

<!-- ── 图片详情弹窗 ── -->
<div id="modal" class="modal hidden">
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal-card">
    <button class="modal-close" id="modalClose">✕</button>
    <img id="modalImg" src="" alt="">
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ── 外部图片预览弹窗 ── -->
<div id="extModal" class="modal hidden">
  <div class="modal-backdrop" id="extModalBackdrop"></div>
  <div class="modal-card">
    <button class="modal-close" id="extModalClose">✕</button>
    <img id="extModalImg" src="" alt="" style="max-height:55vh">
    <div class="modal-body" id="extModalBody"></div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
